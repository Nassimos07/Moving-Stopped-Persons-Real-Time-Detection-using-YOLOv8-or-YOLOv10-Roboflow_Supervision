      <stop offset="64%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-amber" cx="68%" cy="84%" r="26%" gradientUnits="userSpaceOnUse" gradientTransform="scale(1.6,1)">
      <stop offset="0%" stop-color="#F0ABFC" stop-opacity="0.45"/>
      <stop offset="64%" stop-color="#F0ABFC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-pink" cx="43%" cy="84%" r="24%" gradientUnits="userSpaceOnUse" gradientTransform="scale(1.6,1)">
