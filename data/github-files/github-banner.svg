    </radialGradient>
    <radialGradient id="wave-left" cx="0%" cy="100%" r="70%" gradientUnits="userSpaceOnUse" gradientTransform="skewY(-8)">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.78"/>
