      <stop offset="74%" stop-color="#000000" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.34"/>
    </radialGradient>
    <filter id="blur-bg" x="-30%" y="-30%" width="160%" height="160%">
