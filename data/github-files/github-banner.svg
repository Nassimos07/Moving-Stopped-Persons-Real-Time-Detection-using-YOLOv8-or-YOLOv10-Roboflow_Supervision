<svg width="100%" viewBox="0 0 1920 550" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Moving / Stopped Persons Detection GitHub Banner</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">GitHub banner for Moving / Stopped Persons Detection – YOLO video inference pipeline for tracking and motion-state classification</desc>

  <defs>
    <radialGradient id="bg-warm" cx="18%" cy="108%" r="32%" gradientUnits="userSpaceOnUse" gradientTransform="scale(1.8,1)">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.88"/>
      <stop offset="64%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-cool" cx="82%" cy="108%" r="32%" gradientUnits="userSpaceOnUse" gradientTransform="scale(1.8,1)">
